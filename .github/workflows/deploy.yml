name: Deploy to Hostinger

on:
  push:
    branches:
      - main

jobs:
  ftp-deploy:
    runs-on: ubuntu-latest

    env:
      FTP_PASSWORD: ${{ secrets.HOSTINGER_FTP_PASSWORD }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify password secret
        run: |
          if [ -z "$FTP_PASSWORD" ]; then
            echo "Password secret is EMPTY or NOT FOUND"
            exit 1
          fi
          echo "Password secret exists"

      - name: Deploy to Hostinger
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: 195.35.62.66
          username: u228849669.requestsdev
          password: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
          port: 21
          protocol: ftp
          local-dir: ./
          server-dir: ./