<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | IMS Portal</title>
  <link rel="icon" type="image/png" href="assets/ims-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css?v=auth-1">
</head>
<body>
  <main class="auth-page">
    <section class="auth-card">
      <div class="auth-brand">
        <img src="assets/ims-icon.png" alt="IMS">
        <div>
          <span>IMS Portal</span>
          <h1>Login</h1>
        </div>
      </div>

      <form class="auth-form" onsubmit="handleLogin(event)">
        <label>Email
          <input type="email" id="email" placeholder="Enter your email" required>
        </label>
        <label>Password
          <input type="password" id="password" placeholder="Enter your password" required>
        </label>
        <p id="errorMsg" style="color:red; font-size:13px; display:none;"></p>
        <button class="primary auth-submit" type="submit">Login</button>
      </form>

      <p class="auth-switch">Don't have an account? <a href="signup.html">Sign up</a></p>
    </section>
  </main>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://xgjcesjksmhhvvvceegi.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_SPL5YZrnxx5HT1Qom5vJpg_5F7osFOB';  // paste your publishable key

    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // If already logged in, go straight to dashboard
    sb.auth.getSession().then(({ data }) => {
      if (data.session) window.location.href = 'index.html';
    });

    async function handleLogin(event) {
      event.preventDefault(); // stops the form from redirecting

      const email    = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const errorMsg = document.getElementById('errorMsg');

      errorMsg.style.display = 'none';

      const { data, error } = await sb.auth.signInWithPassword({ email, password });

      if (error) {
        errorMsg.textContent = error.message;
        errorMsg.style.display = 'block';
        return;
      }

      // Save token so Express can verify it later
      localStorage.setItem('sb_token', data.session.access_token);

      window.location.href = 'index.html';
    }
  </script>
</body>
</html>
