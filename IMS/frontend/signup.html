<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up | IMS Portal</title>
  <link rel="icon" type="image/png" href="assets/ims-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css?v=auth-1">
</head>
<body>
  <main class="auth-page">
    <section class="auth-card">
      <div class="auth-brand">
        <img src="assets/ims-icon.png" alt="IMS">
        <div>
          <span>IMS Portal</span>
          <h1>Create Account</h1>
        </div>
      </div>

      <form class="auth-form" onsubmit="handleSignup(event)">
        <label>Full name
          <input type="text" id="name" placeholder="Enter your name" required>
        </label>
        <label>Email
          <input type="email" id="email" placeholder="Enter your email" required>
        </label>
        <label>Password
          <input type="password" id="password" placeholder="Create a password" required>
        </label>
        <p id="errorMsg" style="color:red; font-size:13px; display:none;"></p>
        <p id="successMsg" style="color:green; font-size:13px; display:none;"></p>
        <button class="primary auth-submit" type="submit">Sign Up</button>
      </form>

      <p class="auth-switch">Already have an account? <a href="login.html">Login</a></p>
    </section>
  </main>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://xgjcesjksmhhvvvceegi.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_SPL5YZrnxx5HT1Qom5vJpg_5F7osFOB';  // paste your publishable key

    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function handleSignup(event) {
      event.preventDefault();

      const name     = document.getElementById('name').value;
      const email    = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const errorMsg   = document.getElementById('errorMsg');
      const successMsg = document.getElementById('successMsg');

      errorMsg.style.display = 'none';
      successMsg.style.display = 'none';

      if (password.length < 6) {
        errorMsg.textContent = 'Password must be at least 6 characters.';
        errorMsg.style.display = 'block';
        return;
      }

      const { data, error } = await sb.auth.signUp({
        email,
        password,
        options: { data: { full_name: name } }
      });

      if (error) {
        errorMsg.textContent = error.message;
        errorMsg.style.display = 'block';
        return;
      }

      successMsg.textContent = 'Account created! Check your email to confirm, then log in.';
      successMsg.style.display = 'block';
    }
  </script>
</body>
</html>
